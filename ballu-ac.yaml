esphome:
  name: ballu-ac
  friendly_name: Ballu AC

external_components:
  - source:
      url: https://github.com/Vl-VSV/ballu-ac-controller.git
      type: git
      ref: main
    components: [ballu_ac]
    refresh: 0s

esp32:
  variant: esp32c3
  framework:
    type: esp-idf

logger:
  baud_rate: 0

api:
  encryption:
    key: "5stJODPiDe+bHQ4wrYzlHs0J414w+w1cq9YVGj8q+Bg="

ota:
  - platform: esphome

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  ap:
    ssid: "Ballu AC Fallback Hotspot"
    password: "LErARBr1kOFb"

uart:
  baud_rate: 9600
  data_bits: 8
  parity: EVEN
  stop_bits: 1
  rx_pin: GPIO3
  tx_pin: GPIO4

climate:
  - platform: ballu_ac
    name: "Ballu AC"
